<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizNova - Test Your Knowledge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color:blue;
            --secondary-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --dark-color: #1f2937;
            --light-color: #f9fafb;
            --border-color: #e5e7eb;
            --correct-color:blue;
            --incorrect-color: #ef4444;
            --selected-color: #6366f1;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --gradient: linear-gradient(blue,blue);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--dark-color);
        }

        /* Header */
        .quiz-header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .quiz-info {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .category-display {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .category-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: white;
        }

        .category-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .quiz-timer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--light-color);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .timer-critical {
            color: var(--danger-color) !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Main Quiz Container */
        .quiz-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Progress Section */
        .quiz-progress {
            background: white;
            border-radius: 15px;
            padding: 25px 30px;
            box-shadow: var(--shadow);
            margin-bottom: 30px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .question-count {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--dark-color);
        }

        .score-display {
            background: var(--primary-color);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .progress-bar {
            height: 10px;
            background-color: #e5e7eb;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gradient);
            border-radius: 5px;
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Question Card */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: var(--shadow-lg);
            margin-bottom: 30px;
        }

        .question-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .question-number {
            background: var(--primary-color);
            color: white;
            padding: 8px 25px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
        }

        .question-hint {
            background: #fef3c7;
            color: var(--warning-color);
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .question-text {
            font-size: 1.6rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: var(--dark-color);
        }

        /* Options Section */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        .option-item {
            padding: 20px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .option-item:hover {
            border-color: var(--primary-color);
            background-color: #f8fafc;
            transform: translateY(-2px);
        }

        .option-item.selected {
            border-color: var(--selected-color);
            background-color: #e0e7ff;
        }

        .option-item.correct {
            border-color: var(--correct-color);
            background-color: #d1fae5;
        }

        .option-item.incorrect {
            border-color: var(--incorrect-color);
            background-color: #fee2e2;
        }

        .option-marker {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            background: #f3f4f6;
            color: var(--dark-color);
            flex-shrink: 0;
        }

        .option-item.selected .option-marker {
            background: var(--selected-color);
            color: white;
        }

        .option-item.correct .option-marker {
            background: var(--correct-color);
            color: white;
        }

        .option-item.incorrect .option-marker {
            background: var(--incorrect-color);
            color: white;
        }

        .option-text {
            flex: 1;
            font-size: 1.1rem;
            line-height: 1.5;
        }

        /* Navigation Buttons */
        .quiz-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
        }

        .nav-btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-prev {
            background-color: #f3f4f6;
            color: var(--dark-color);
            border: 1px solid var(--border-color);
        }

        .btn-prev:hover:not(:disabled) {
            background-color: #e5e7eb;
        }

        .btn-next {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-next:hover:not(:disabled) {
            background-color: #4338ca;
        }

        .btn-submit {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            background-color: #0da271;
        }

        /* Results Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: white;
            border-radius: 20px;
            width: 90%;
            max-width: 600px;
            transform: translateY(20px);
            transition: transform 0.3s ease;
            overflow: hidden;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-header {
            background: var(--gradient);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .modal-header h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .modal-body {
            padding: 40px;
        }

        .result-summary {
            text-align: center;
            margin-bottom: 30px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--gradient);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            color: white;
        }

        .score-percentage {
            font-size: 2.5rem;
            font-weight: 700;
        }

        .score-text {
            font-size: 1rem;
            opacity: 0.9;
        }

        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .result-stat {
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .result-stat h3 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .result-stat p {
            color: #6b7280;
            font-size: 0.9rem;
        }

        .result-feedback {
            text-align: center;
            margin: 30px 0;
            padding: 20px;
            background: #f0f9ff;
            border-radius: 12px;
            border-left: 4px solid var(--primary-color);
        }

        .modal-actions {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-retry {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-retry:hover {
            background-color: #4338ca;
        }

        .btn-review {
            background-color: #f3f4f6;
            color: var(--dark-color);
            border: 1px solid var(--border-color);
        }

        .btn-review:hover {
            background-color: #e5e7eb;
        }

        .btn-home {
            background-color: var(--secondary-color);
            color: white;
        }

        .btn-home:hover {
            background-color: #0da271;
        }

        /* Quiz Actions */
        .quiz-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .action-btn {
            padding: 12px 20px;
            background-color: #f3f4f6;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .action-btn:hover {
            background-color: #e5e7eb;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .quiz-header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .quiz-info {
                flex-direction: column;
                gap: 15px;
                width: 100%;
            }

            .quiz-container {
                padding: 0 15px;
            }

            .question-card {
                padding: 25px;
            }

            .question-text {
                font-size: 1.4rem;
            }

            .quiz-navigation {
                flex-direction: column;
                gap: 15px;
            }

            .nav-btn {
                width: 100%;
                justify-content: center;
            }

            .modal-actions {
                flex-direction: column;
            }

            .result-stats {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 480px) {
            .question-text {
                font-size: 1.2rem;
            }

            .option-item {
                padding: 15px;
            }

            .option-marker {
                width: 30px;
                height: 30px;
                font-size: 0.9rem;
            }

            .modal-header {
                padding: 30px 20px;
            }

            .modal-header h2 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Quiz Header -->
    <header class="quiz-header">
        <div class="quiz-info">
            <div class="category-display" id="categoryDisplay">
                <!-- Will be populated by JavaScript -->
            </div>
            <div class="quiz-timer" id="quizTimer">
                <i class="fas fa-clock"></i>
                <span id="timeDisplay">15:00</span>
            </div>
        </div>
    </header>

    <!-- Main Quiz Container -->
    <main class="quiz-container">
        <!-- Progress Section -->
        <div class="quiz-progress">
            <div class="progress-info">
                <div class="question-count" id="questionCount">Question 1 of 10</div>
                <div class="score-display" id="scoreDisplay">Score: 0</div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="question-card">
            <div class="question-header">
                <div class="question-number" id="questionNumber">Question 1</div>
                <div class="question-hint" id="questionHint">
                    <i class="fas fa-lightbulb"></i>
                    <span>Click an option to select your answer</span>
                </div>
            </div>
            
            <h2 class="question-text" id="questionText">Loading question...</h2>
            
            <div class="options-grid" id="optionsContainer">
                <!-- Options will be populated by JavaScript -->
            </div>

            <!-- Quiz Actions -->
            <div class="quiz-actions">
                <button class="action-btn" id="hintBtn">
                    <i class="fas fa-lightbulb"></i> Show Hint
                </button>
                <button class="action-btn" id="flagBtn">
                    <i class="far fa-flag"></i> Flag Question
                </button>
            </div>
        </div>

        <!-- Navigation -->
        <div class="quiz-navigation">
            <button class="nav-btn btn-prev" id="prevBtn" disabled>
                <i class="fas fa-arrow-left"></i> Previous
            </button>
            <button class="nav-btn btn-next" id="nextBtn">
                Next <i class="fas fa-arrow-right"></i>
            </button>
            <button class="nav-btn btn-submit" id="submitBtn" style="display: none;">
                Submit Quiz <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </main>

    <!-- Results Modal -->
    <div class="modal-overlay" id="resultsModal">
        <div class="modal">
            <div class="modal-header">
                <h2>Quiz Completed!</h2>
                <p>Here's how you performed</p>
            </div>
            <div class="modal-body">
                <div class="result-summary">
                    <div class="score-circle" id="scoreCircle">
                        <!-- Will be populated by JavaScript -->
                    </div>
                </div>
                
                <div class="result-stats">
                    <div class="result-stat">
                        <h3 id="correctAnswers">0</h3>
                        <p>Correct Answers</p>
                    </div>
                    <div class="result-stat">
                        <h3 id="totalQuestions">0</h3>
                        <p>Total Questions</p>
                    </div>
                    <div class="result-stat">
                        <h3 id="timeTaken">00:00</h3>
                        <p>Time Taken</p>
                    </div>
                    <div class="result-stat">
                        <h3 id="scorePercentage">0%</h3>
                        <p>Your Score</p>
                    </div>
                </div>
                
                <div class="result-feedback" id="resultFeedback">
                    <!-- Feedback will be populated by JavaScript -->
                </div>
                
                <div class="modal-actions">
                    <button class="modal-btn btn-retry" id="retryBtn">
                        <i class="fas fa-redo"></i> Retry Quiz
                    </button>
                    <button class="modal-btn btn-review" id="reviewBtn">
                        <i class="fas fa-list"></i> Review Answers
                    </button>
                    <button class="modal-btn btn-home" id="homeBtn">
                        <i class="fas fa-home"></i> Back to Categories
                    </button>
                </div>
            </div>
        </div>
    </div>

                {
                    question: "What is 25% of 200?",
                    options: ["25", "50", "75", "100"],
                    correctAnswer: 1,
                    hint: "One quarter of 200."
                }
            ],
            "Literature": [
                {
                    question: "Who wrote 'Romeo and Juliet'?",
                    options: ["Charles Dickens", "William Shakespeare", "Jane Austen", "Mark Twain"],
                    correctAnswer: 1,
                    hint: "English playwright and poet."
                },
                {
                    question: "In which novel would you find the character 'Sherlock Holmes'?",
                    options: ["Dracula", "The Great Gatsby", "Pride and Prejudice", "A Study in Scarlet"],
                    correctAnswer: 3,
                    hint: "Created by Arthur Conan Doyle."
                },
                {
                    question: "Who wrote '1984'?",
                    options: ["George Orwell", "Aldous Huxley", "Ray Bradbury", "J.R.R. Tolkien"],
                    correctAnswer: 0,
                    hint: "Author of 'Animal Farm'."
                },
                {
                    question: "What is the first book of the Harry Potter series?",
                    options: ["The Chamber of Secrets", "The Prisoner of Azkaban", "The Philosopher's Stone", "The Goblet of Fire"],
                    correctAnswer: 2,
                    hint: "Also called 'Sorcerer's Stone' in the US."
                },
                {
                    question: "Who wrote 'To Kill a Mockingbird'?",
                    options: ["Harper Lee", "J.D. Salinger", "F. Scott Fitzgerald", "Ernest Hemingway"],
                    correctAnswer: 0,
                    hint: "Published in 1960."
                }
            ]
        };

        // Quiz State
        let currentQuestion = 0;
        let userAnswers = [];
        let score = 0;
        let timeLeft = 15 * 60; // 15 minutes in seconds
        let timerInterval = null;
        let quizCompleted = false;
        let selectedCategory = null;
        let currentQuestions = [];

        // DOM Elements
        const categoryDisplay = document.getElementById('categoryDisplay');
        const questionText = document.getElementById('questionText');
        const questionHint = document.getElementById('questionHint');
        const optionsContainer = document.getElementById('optionsContainer');
        const questionCount = document.getElementById('questionCount');
        const questionNumber = document.getElementById('questionNumber');
        const progressFill = document.getElementById('progressFill');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const timeDisplay = document.getElementById('timeDisplay');
        const quizTimer = document.getElementById('quizTimer');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const hintBtn = document.getElementById('hintBtn');
        const flagBtn = document.getElementById('flagBtn');
        const resultsModal = document.getElementById('resultsModal');
        const scoreCircle = document.getElementById('scoreCircle');
        const correctAnswers = document.getElementById('correctAnswers');
        const totalQuestions = document.getElementById('totalQuestions');
        const timeTaken = document.getElementById('timeTaken');
        const scorePercentage = document.getElementById('scorePercentage');
        const resultFeedback = document.getElementById('resultFeedback');
        const retryBtn = document.getElementById('retryBtn');
        const reviewBtn = document.getElementById('reviewBtn');
        const homeBtn = document.getElementById('homeBtn');

        // Initialize Quiz
        function initQuiz() {
            // Get selected category from localStorage
            const savedCategory = localStorage.getItem('selectedCategory');
            if (!savedCategory) {
                alert('No category selected! Redirecting to categories page.');
                window.location.href = 'categories.html';
                return;
            }

            selectedCategory = JSON.parse(savedCategory);
            currentQuestions = quizQuestions[selectedCategory.name] || quizQuestions["Science"];
            
            // Initialize user answers array
            userAnswers = Array(currentQuestions.length).fill(null);
            
            // Display category
            displayCategory();
            
            // Start quiz
            updateScore();
            startTimer();
            loadQuestion(currentQuestion);
            updateNavigationButtons();
        }

        // Display Category
        function displayCategory() {
            const categoryIconMap = {
                "Science": "fas fa-flask",
                "History": "fas fa-landmark",
                "Geography": "fas fa-globe-americas",
                "Entertainment": "fas fa-film",
                "Sports": "fas fa-futbol",
                "Technology": "fas fa-laptop-code",
                "Mathematics": "fas fa-calculator",
                "Literature": "fas fa-book-open"
            };

            const categoryColorMap = {
                // "Science": "#3b82f6",
               "History": "#ef4444",
                "Geography": "#10b981",
                "Entertainment": "#8b5cf6",
                "Sports": "#f59e0b",
                "Technology": "#6366f1",
                "Mathematics": "#ec4899",
                "Literature": "#14b8a6"
            };

            const icon = categoryIconMap[selectedCategory.name] || "fas fa-question-circle";
            const color = categoryColorMap[selectedCategory.name] || "#4f46e5";

            categoryDisplay.innerHTML = `
                <div class="category-icon" style="background: ${color};">
                    <i class="${icon}"></i>
                </div>
                <div>
                    <div class="category-name">${selectedCategory.name} Quiz</div>
                    <div style="font-size: 0.9rem; color: #6b7280;">${selectedCategory.difficulty.charAt(0).toUpperCase() + selectedCategory.difficulty.slice(1)} Level</div>
                </div>
            `;
        }

        // Load Question
        function loadQuestion(index) {
            const question = currentQuestions[index];
            
            // Update question text
            questionText.textContent = question.question;
            questionHint.querySelector('span').textContent = question.hint;
            questionCount.textContent = `Question ${index + 1} of ${currentQuestions.length}`;
            questionNumber.textContent = `Question ${index + 1}`;
            
            // Clear options
            optionsContainer.innerHTML = '';
            
            // Create options
            question.options.forEach((option, optionIndex) => {
                const optionItem = document.createElement('div');
                optionItem.className = 'option-item';
                optionItem.dataset.index = optionIndex;
                
                // Check if this option was previously selected
                if (userAnswers[index] === optionIndex) {
                    optionItem.classList.add('selected');
                }
                
                // Check if we're reviewing and this is the correct answer
                if (quizCompleted && optionIndex === question.correctAnswer) {
                    optionItem.classList.add('correct');
                }
                
                // Check if we're reviewing and this was a wrong answer
                if (quizCompleted && userAnswers[index] === optionIndex && optionIndex !== question.correctAnswer) {
                    optionItem.classList.add('incorrect');
                }
                
                optionItem.innerHTML = `
                    <div class="option-marker">${String.fromCharCode(65 + optionIndex)}</div>
                    <div class="option-text">${option}</div>
                `;
                
                // Only add click event if quiz is not completed
                if (!quizCompleted) {
                    optionItem.addEventListener('click', () => selectOption(optionIndex));
                }
                
                optionsContainer.appendChild(optionItem);
            });
            
            // Update progress bar
            updateProgress();
        }

        // Select Option
        function selectOption(optionIndex) {
            // Clear previous selection
            document.querySelectorAll('.option-item').forEach(item => {
                item.classList.remove('selected');
            });
            
            // Mark selected option
            const selectedOption = document.querySelector(`.option-item[data-index="${optionIndex}"]`);
            selectedOption.classList.add('selected');
            
            // Store answer
            userAnswers[currentQuestion] = optionIndex;
            
            // Update score if answer is correct
            updateScore();
            
            // Enable next button if not already enabled
            if (currentQuestion < currentQuestions.length - 1) {
                nextBtn.disabled = false;
            } else {
                submitBtn.style.display = 'inline-flex';
                nextBtn.style.display = 'none';
            }
        }

        // Update Progress
        function updateProgress() {
            const progress = ((currentQuestion + 1) / currentQuestions.length) * 100;
            progressFill.style.width = `${progress}%`;
        }

        // Update Score
        function updateScore() {
            // Calculate current score
            score = 0;
            userAnswers.forEach((answer, index) => {
                if (answer !== null && answer === currentQuestions[index].correctAnswer) {
                    score++;
                }
            });
            
            // Update display
            scoreDisplay.textContent = `Score: ${score}`;
        }

        // Update Navigation Buttons
        function updateNavigationButtons() {
            prevBtn.disabled = currentQuestion === 0;
            
            if (currentQuestion === currentQuestions.length - 1) {
                nextBtn.style.display = 'none';
                submitBtn.style.display = 'inline-flex';
            } else {
                nextBtn.style.display = 'inline-flex';
                submitBtn.style.display = 'none';
            }
            
            // Enable next button if current question is answered
            if (userAnswers[currentQuestion] !== null && currentQuestion < currentQuestions.length - 1) {
                nextBtn.disabled = false;
            }
        }

        // Timer Functions
        function startTimer() {
            updateTimeDisplay();
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimeDisplay();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    submitQuiz();
                }
                
                // Add warning animation when less than 2 minutes
                if (timeLeft <= 120) {
                    quizTimer.classList.add('timer-critical');
                }
            }, 1000);
        }

        function updateTimeDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timeDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        // Navigation Functions
        function nextQuestion() {
            if (currentQuestion < currentQuestions.length - 1) {
                currentQuestion++;
                loadQuestion(currentQuestion);
                updateNavigationButtons();
            }
        }

        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                loadQuestion(currentQuestion);
                updateNavigationButtons();
            }
        }

        // Submit Quiz and Show Results
        function submitQuiz() {
            clearInterval(timerInterval);
            quizCompleted = true;
            
            // Calculate final results
            const totalQuestionsCount = currentQuestions.length;
            const correctAnswersCount = userAnswers.filter((answer, index) => 
                answer === currentQuestions[index].correctAnswer
            ).length;
            const percentage = Math.round((correctAnswersCount / totalQuestionsCount) * 100);
            const timeUsed = (15 * 60) - timeLeft;
            
            // Update results modal
            scoreCircle.innerHTML = `
                <div class="score-percentage">${percentage}%</div>
                <div class="score-text">Score</div>
            `;
            
            correctAnswers.textContent = correctAnswersCount;
            totalQuestions.textContent = totalQuestionsCount;
            timeTaken.textContent = formatTime(timeUsed);
            scorePercentage.textContent = `${percentage}%`;
            
            // Set feedback based on score
            let feedback = "";
            let feedbackColor = "";
            
            if (percentage >= 90) {
                feedback = "🎉 Outstanding! You're a true expert in this category!";
                feedbackColor = "#10b981";
            } else if (percentage >= 70) {
                feedback = "👍 Great job! You have excellent knowledge in this area.";
                feedbackColor = "#3b82f6";
            } else if (percentage >= 50) {
                feedback = "😊 Good effort! You have a solid understanding.";
                feedbackColor = "#f59e0b";
            } else if (percentage >= 30) {
                feedback = "📚 Keep learning! Review the questions you missed.";
                feedbackColor = "#ef4444";
            } else {
                feedback = "💪 Don't give up! Try again to improve your score.";
                feedbackColor = "#ef4444";
            }
            
            resultFeedback.innerHTML = feedback;
            resultFeedback.style.borderLeftColor = feedbackColor;
            resultFeedback.style.background = feedbackColor + "10";
            
            // Show modal
            resultsModal.classList.add('active');
            
            // Reload current question to show correct/incorrect indicators
            loadQuestion(currentQuestion);
        }

        function formatTime(seconds) {
            const minutes = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Event Listeners
        prevBtn.addEventListener('click', prevQuestion);
        nextBtn.addEventListener('click', nextQuestion);
        submitBtn.addEventListener('click', submitQuiz);

        hintBtn.addEventListener('click', () => {
            const hintText = questionHint.querySelector('span');
            hintText.textContent = currentQuestions[currentQuestion].hint;
        });

        flagBtn.addEventListener('click', () => {
            alert('Question flagged for review!');
        });

        retryBtn.addEventListener('click', () => {
            // Reset quiz state
            currentQuestion = 0;
            userAnswers = Array(currentQuestions.length).fill(null);
            score = 0;
            timeLeft = 15 * 60;
            quizCompleted = false;
            
            // Reset UI
            resultsModal.classList.remove('active');
            submitBtn.style.display = 'none';
            nextBtn.style.display = 'inline-flex';
            quizTimer.classList.remove('timer-critical');
            
            // Restart quiz
            updateScore();
            startTimer();
            loadQuestion(currentQuestion);
            updateNavigationButtons();
        });

        reviewBtn.addEventListener('click', () => {
            resultsModal.classList.remove('active');
            // User can review answers by navigating through questions
        });

        homeBtn.addEventListener('click', () => {
            window.location.href = 'categories.html';
        });

        // Keyboard Navigation
        document.addEventListener('keydown', (e) => {
            if (quizCompleted) return;
            
            switch(e.key) {
                case 'ArrowLeft':
                    if (!prevBtn.disabled) prevQuestion();
                    break;
                case 'ArrowRight':
                    if (!nextBtn.disabled) nextQuestion();
                    break;
                case '1':
                case '2':
                case '3':
                case '4':
                    const optionIndex = parseInt(e.key) - 1;
                    if (optionIndex >= 0 && optionIndex < 4) {
                        selectOption(optionIndex);
                    }
                    break;
                case ' ':
                case 'Enter':
                    if (currentQuestion < currentQuestions.length - 1) {
                        nextQuestion();
                    } else {
                        submitQuiz();
                    }
                    break;
            }
        });

        // Initialize the quiz
        initQuiz();
    </script>
</body>
</html>
