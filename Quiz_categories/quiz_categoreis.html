<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizNova - Choose Your Category</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color:blue;
            --secondary-color: #10b981;
            --danger-color: blue;
            --warning-color: #f59e0b;
            --dark-color: #1f2937;
            --light-color: #f9fafb;
            --border-color: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            color: var(--dark-color);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3rem;
            background:blue;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .header p {
            font-size: 1.2rem;
            color: #6b7280;
            max-width: 600px;
            margin: 0 auto;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .category-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .category-card:hover {
            transform: translateY(-10px);
            box-shadow: var(--shadow-lg);
        }

        .category-header {
            height: 200px;
            overflow: hidden;
            position: relative;
        }

        .category-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .category-card:hover .category-header img {
            transform: scale(1.1);
        }

        .category-icon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            box-shadow: var(--shadow);
        }

        .category-content {
            padding: 30px;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--dark-color);
        }

        .category-description {
            color: #6b7280;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .category-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat {
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6b7280;
            margin-top: 5px;
        }

        .category-difficulty {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .difficulty-beginner {
            background: #d1fae5;
            color: var(--secondary-color);
        }

        .difficulty-intermediate {
            background: #fef3c7;
            color: var(--warning-color);
        }

        .difficulty-advanced {
            background: #fee2e2;
            color: var(--danger-color);
        }

        .category-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            background: #f3f4f6;
            color: #6b7280;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .start-quiz-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .start-quiz-btn:hover {
            background: #4338ca;
        }

        /* Color coding for categories */
        .science .category-icon { background: blue; }
        .history .category-icon { background: red; }
        .geography .category-icon { background: green; }
        .entertainment .category-icon { background: #8b5cf6; }
        .sports .category-icon { background: #f59e0b; }
        .technology .category-icon { background: #6366f1; }
        .mathematics .category-icon { background: #ec4899; }
        .literature .category-icon { background: #14b8a6; }

        .footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
            color: #6b7280;
        }

        @media (max-width: 768px) {
            .categories-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
            
            .header h1 {
                font-size: 2.2rem;
            }
        }

        @media (max-width: 480px) {
            .categories-grid {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Choose Your Quiz Category</h1>
            <p>Select a category and test your knowledge. Get instant scores and track your progress!</p>
        </div>

        <div class="categories-grid" id="categoriesGrid">
            <!-- Categories will be populated by JavaScript -->
        </div>

        <div class="footer">
            <p>&copy; 2025 QuizNova. Challenge Your Knowledge!</p>
        </div>
    </div>

    <script>
        // Quiz Categories Data
        const categories = [
            {
                id: 1,
                name: "Science",
                description: "Test your knowledge of physics, chemistry, biology, and astronomy. From atoms to galaxies!",
                icon: "fas fa-flask",
                image: "https://images.unsplash.com/photo-1532094349884-543bc11b234d?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "intermediate",
                quizzes: 1200,
                questions: 15000,
                participants: 45000,
                tags: ["Physics", "Chemistry", "Biology", "Astronomy"]
            },
            {
                id: 2,
                name: "History",
                description: "Journey through time from ancient civilizations to modern world events and historical figures.",
                icon: "fas fa-landmark",
                image: "https://images.unsplash.com/photo-1505664194779-8beaceb93744?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "intermediate",
                quizzes: 850,
                questions: 10000,
                participants: 32000,
                tags: ["Ancient", "Medieval", "Modern", "World Wars"]
            },
            {
                id: 3,
                name: "Geography",
                description: "Explore countries, capitals, landmarks, and physical features around the world.",
                icon: "fas fa-globe-americas",
                image: "https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "beginner",
                quizzes: 950,
                questions: 12000,
                participants: 38000,
                tags: ["Countries", "Capitals", "Landmarks", "Maps"]
            },
           
            {
                id: 5,
                name: "Sports",
                description: "From football to basketball, cricket to tennis. All sports knowledge in one place!",
                icon: "fas fa-futbol",
                image: "https://images.unsplash.com/photo-1461896836934-ffe607ba8211?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "beginner",
                quizzes: 750,
                questions: 9000,
                participants: 28000,
                tags: ["Football", "Basketball", "Cricket", "Olympics"]
            },
           
            {
                id: 7,
                name: "Mathematics",
                description: "Algebra, geometry, calculus, statistics, and mathematical puzzles to challenge your mind.",
                icon: "fas fa-calculator",
                image: "https://images.unsplash.com/photo-1635070041078-e363dbe005cb?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "advanced",
                quizzes: 800,
                questions: 10000,
                participants: 25000,
                tags: ["Algebra", "Geometry", "Calculus", "Statistics"]
            },
            {
                id: 8,
                name: "Literature",
                description: "Classic novels, famous authors, poetry, literary devices, and book trivia.",
                icon: "fas fa-book-open",
                image: "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80",
                difficulty: "intermediate",
                quizzes: 650,
                questions: 8000,
                participants: 22000,
                tags: ["Novels", "Poetry", "Authors", "Classics"]
            }
        ];

        // Render categories
        function renderCategories() {
            const categoriesGrid = document.getElementById('categoriesGrid');
            categoriesGrid.innerHTML = '';
            
            categories.forEach(category => {
                const categoryCard = document.createElement('div');
                categoryCard.className = `category-card ${category.name.toLowerCase()}`;
                
                categoryCard.innerHTML = `
                    <div class="category-header">
                        <img src="${category.image}" alt="${category.name}">
                        <div class="category-icon">
                            <i class="${category.icon}"></i>
                        </div>
                    </div>
                    <div class="category-content">
                        <h3 class="category-title">${category.name}</h3>
                        <span class="category-difficulty difficulty-${category.difficulty}">
                            ${category.difficulty.charAt(0).toUpperCase() + category.difficulty.slice(1)}
                        </span>
                        <p class="category-description">${category.description}</p>
                        
                        <div class="category-stats">
                            <div class="stat">
                                <div class="stat-value">${category.quizzes}</div>
                                <div class="stat-label">Quizzes</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${category.questions.toLocaleString()}</div>
                                <div class="stat-label">Questions</div>
                            </div>
                            <div class="stat">
                                <div class="stat-value">${category.participants.toLocaleString()}+</div>
                                <div class="stat-label">Participants</div>
                            </div>
                        </div>
                        
                        <div class="category-tags">
                            ${category.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                        </div>
                        
                        <button class="start-quiz-btn" data-category="${category.name}">
                            <i class="fas fa-play-circle"></i> Start ${category.name} Quiz
                        </button>
                    </div>
                `;
                
                categoriesGrid.appendChild(categoryCard);
            });
            
            // Add event listeners to buttons
            document.querySelectorAll('.start-quiz-btn').forEach(button => {
                button.addEventListener('click', function() {
                    const categoryName = this.dataset.category;
                    const category = categories.find(c => c.name === categoryName);
                    startQuiz(category);
                });
            });
        }

        // Start quiz function
        function startQuiz(category) {
            // Save selected category to localStorage
            localStorage.setItem('selectedCategory', JSON.stringify(category));
            
            // Redirect to quiz page
            window.location.href = 'recentQuiz.html';
           
            
        }

        // Initialize
        renderCategories();
    </script>
</body>
</html>
